<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>drpc Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <header class="header">
      <div class="header-glow"></div>
      <div class="header-content">
        <div class="brand">
          <div class="brand-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M12 2L2 7l10 5 10-5-10-5z" fill="url(#g1)" opacity="0.9"/>
              <path d="M2 17l10 5 10-5" stroke="url(#g1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              <path d="M2 12l10 5 10-5" stroke="url(#g1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              <defs>
                <linearGradient id="g1" x1="0" y1="0" x2="24" y2="24">
                  <stop offset="0%" stop-color="#f06449"/>
                  <stop offset="100%" stop-color="#f0a030"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <span class="brand-name">drpc</span>
        </div>
        <div class="status" id="status">
          <span class="status-dot" id="statusDot"></span>
          <span class="status-label" id="statusLabel">Checking…</span>
        </div>
      </div>
    </header>

    <!-- Status detail -->
    <div class="status-detail" id="statusDetail"></div>

    <!-- Sites -->
    <section class="sites-section">
      <div class="section-label">Sites</div>
      <div class="sites-list" id="sitesList"></div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <button class="reset-btn" id="resetBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
        Reset to defaults
      </button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
